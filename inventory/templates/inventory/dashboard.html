<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,system-ui,sans-serif);background:var(--surface-0,#f5f5f3);color:var(--text-primary,#1a1a18);font-size:14px;min-height:100vh}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--surface-2,#fff);border-right:0.5px solid var(--border,rgba(0,0,0,.12));display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* Sidebar */
.logo{padding:18px 16px 14px;border-bottom:0.5px solid var(--border,rgba(0,0,0,.12));}
.logo-title{font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px}
.logo-icon{width:28px;height:28px;background:#185FA5;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.logo-sub{font-size:11px;color:var(--text-muted,#888);margin-top:2px}
.nav{padding:10px 8px;flex:1}
.nav-section{font-size:10px;color:var(--text-muted,#888);text-transform:uppercase;letter-spacing:.08em;padding:10px 8px 4px;font-weight:500}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text-secondary,#555);margin-bottom:1px;transition:background .1s}
.nav-item:hover{background:var(--surface-1,#f5f5f3)}
.nav-item.active{background:var(--bg-accent,#e6f1fb);color:var(--text-accent,#185FA5);font-weight:500}
.nav-item i{font-size:16px;width:18px;text-align:center}
.user-area{padding:12px 8px;border-top:0.5px solid var(--border,rgba(0,0,0,.12))}
.user-card{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:6px}
.avatar{width:30px;height:30px;border-radius:50%;background:#185FA5;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:500;flex-shrink:0}
.user-info .name{font-size:12px;font-weight:500}
.user-info .role{font-size:11px;color:var(--text-muted,#888)}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--surface-2,#fff);border-bottom:0.5px solid var(--border,rgba(0,0,0,.12));flex-shrink:0}
.page-title{font-size:17px;font-weight:500}
.topbar-actions{display:flex;align-items:center;gap:10px}
.search-box{display:flex;align-items:center;gap:7px;border:0.5px solid var(--border-strong,rgba(0,0,0,.2));border-radius:7px;padding:6px 10px;background:var(--surface-1,#f5f5f3);font-size:13px;color:var(--text-secondary,#555);cursor:text;min-width:200px}
.search-box input{border:none;background:transparent;outline:none;font-size:13px;color:var(--text-primary,#1a1a18);width:100%}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--border-strong,rgba(0,0,0,.2));background:transparent;color:var(--text-primary,#1a1a18);transition:background .1s}
.btn:hover{background:var(--surface-1,#f5f5f3)}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#0C447C}
.btn-danger{background:#A32D2D;color:#fff;border-color:#A32D2D}
.btn-danger:hover{background:#791F1F}
.btn-sm{padding:5px 10px;font-size:12px}

/* Content */
.content{padding:24px;flex:1}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:15px;font-weight:500}

/* Stat cards */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface-2,#fff);border:0.5px solid var(--border,rgba(0,0,0,.12));border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:4px}
.stat-label{font-size:12px;color:var(--text-muted,#888)}
.stat-value{font-size:24px;font-weight:500;line-height:1.2}
.stat-sub{font-size:11px;display:flex;align-items:center;gap:4px}
.stat-up{color:#3B6D11}
.stat-down{color:#A32D2D}
.stat-neutral{color:var(--text-muted,#888)}
.stat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.si-blue{background:#E6F1FB;color:#185FA5}
.si-green{background:#EAF3DE;color:#3B6D11}
.si-amber{background:#FAEEDA;color:#854F0B}
.si-red{background:#FCEBEB;color:#A32D2D}

/* Table */
.table-card{background:var(--surface-2,#fff);border:0.5px solid var(--border,rgba(0,0,0,.12));border-radius:10px;overflow:hidden}
.table-toolbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--border,rgba(0,0,0,.12))}
.filter-row{display:flex;align-items:center;gap:8px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500}
.badge-green{background:#EAF3DE;color:#27500A}
.badge-red{background:#FCEBEB;color:#791F1F}
.badge-amber{background:#FAEEDA;color:#633806}
.badge-blue{background:#E6F1FB;color:#0C447C}
.badge-gray{background:#F1EFE8;color:#444441}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:500;color:var(--text-muted,#888);text-transform:uppercase;letter-spacing:.05em;padding:10px 16px;text-align:left;border-bottom:0.5px solid var(--border,rgba(0,0,0,.12));background:var(--surface-1,#f5f5f3)}
td{padding:11px 16px;border-bottom:0.5px solid var(--border,rgba(0,0,0,.08));font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface-1,#f5f5f3)}
.action-btns{display:flex;gap:6px}

/* Forms / Modals */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface-2,#fff);border-radius:12px;width:520px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 16px;border-bottom:0.5px solid var(--border,rgba(0,0,0,.12))}
.modal-title{font-size:16px;font-weight:500}
.modal-body{padding:20px 22px}
.modal-footer{padding:14px 22px;border-top:0.5px solid var(--border,rgba(0,0,0,.12));display:flex;justify-content:flex-end;gap:8px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-row.single{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
label{font-size:12px;font-weight:500;color:var(--text-secondary,#555)}
input,select,textarea{border:0.5px solid var(--border-strong,rgba(0,0,0,.2));border-radius:6px;padding:8px 10px;font-size:13px;background:var(--surface-1,#f5f5f3);color:var(--text-primary,#1a1a18);outline:none;width:100%;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#185FA5;box-shadow:0 0 0 2px rgba(24,95,165,.12)}

/* Charts */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.chart-card{background:var(--surface-2,#fff);border:0.5px solid var(--border,rgba(0,0,0,.12));border-radius:10px;padding:18px}
.chart-title{font-size:13px;font-weight:500;margin-bottom:14px;color:var(--text-secondary,#555)}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:100px}
.bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar{background:#185FA5;border-radius:3px 3px 0 0;width:100%;transition:height .3s;min-height:4px}
.bar-label{font-size:10px;color:var(--text-muted,#888)}
.bar-val{font-size:10px;font-weight:500;color:var(--text-secondary,#555)}
.donut-legend{display:flex;flex-direction:column;gap:7px;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-label{color:var(--text-secondary,#555);flex:1}
.legend-pct{font-weight:500;color:var(--text-primary,#1a1a18)}

/* Alert banner */
.alert{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;margin-bottom:18px;font-size:13px}
.alert-warning{background:#FAEEDA;color:#633806;border:0.5px solid #EF9F27}
.alert-danger{background:#FCEBEB;color:#791F1F;border:0.5px solid #F09595}

/* Stock level mini-bar */
.stock-bar-wrap{display:flex;align-items:center;gap:8px}
.stock-bar-bg{height:5px;background:var(--surface-1,#f0f0ee);border-radius:3px;flex:1}
.stock-bar-fill{height:5px;border-radius:3px}
.stock-qty{font-size:12px;color:var(--text-secondary,#555);min-width:30px}

/* Low stock list */
.low-stock-list{display:flex;flex-direction:column;gap:0}
.ls-item{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:0.5px solid var(--border,rgba(0,0,0,.08))}
.ls-item:last-child{border-bottom:none}
.ls-name{font-size:13px;font-weight:500}
.ls-sku{font-size:11px;color:var(--text-muted,#888)}
.ls-stock{font-size:13px;font-weight:500;color:#A32D2D}
.ls-threshold{font-size:11px;color:var(--text-muted,#888)}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface-2,#fff);border:0.5px solid var(--border,rgba(0,0,0,.12));border-radius:8px;padding:12px 16px;font-size:13px;display:flex;align-items:center;gap:8px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.12);animation:slideIn .2s ease}
.toast-success{border-left:3px solid #3B6D11;color:#3B6D11}
.toast-error{border-left:3px solid #A32D2D;color:#A32D2D}
@keyframes slideIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Login */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--surface-0,#f5f5f3)}
.login-card{background:var(--surface-2,#fff);border:0.5px solid var(--border,rgba(0,0,0,.12));border-radius:14px;padding:40px;width:380px;max-width:95vw}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.login-icon{width:40px;height:40px;background:#185FA5;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px}
.login-title{font-size:20px;font-weight:500}
.login-sub{font-size:13px;color:var(--text-muted,#888)}
.login-form{display:flex;flex-direction:column;gap:14px}
.login-btn{padding:10px;font-size:14px;font-weight:500}
.demo-hint{margin-top:14px;padding:10px 12px;background:var(--surface-1,#f5f5f3);border-radius:7px;font-size:12px;color:var(--text-secondary,#555)}

/* Report */
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.report-card{background:var(--surface-2,#fff);border:0.5px solid var(--border,rgba(0,0,0,.12));border-radius:10px;padding:16px}
.report-card h4{font-size:13px;font-weight:500;margin-bottom:10px;color:var(--text-secondary,#555)}
.report-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--border,rgba(0,0,0,.06));font-size:12px}
.report-row:last-child{border-bottom:none}
.report-key{color:var(--text-muted,#888)}
.report-val{font-weight:500}
select.filter-select{width:auto;padding:5px 8px;font-size:12px}
.pagination{display:flex;align-items:center;gap:4px;padding:10px 16px}
.page-btn{padding:5px 9px;border:0.5px solid var(--border,rgba(0,0,0,.12));border-radius:5px;font-size:12px;cursor:pointer;background:transparent;color:var(--text-secondary,#555)}
.page-btn:hover{background:var(--surface-1,#f5f5f3)}
.page-btn.active{background:#185FA5;color:#fff;border-color:#185FA5}
</style>

// ── Helpers ───────────────────────────────────────────────────
function fmt(n){return'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtDate(d){return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function useStore(key,init){
  const [v,setV]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init}catch{return init}});
  const set=useCallback(val=>{setV(p=>{const nv=typeof val==='function'?val(p):val;try{localStorage.setItem(key,JSON.stringify(nv))}catch{}return nv});},[key]);
  return[v,set];
}

// ── Toast ─────────────────────────────────────────────────────
function Toast({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2500);return()=>clearTimeout(t)},[onDone]);
  return React.createElement('div',{className:`toast toast-${type}`},
    React.createElement('i',{className:`ti ti-${type==='success'?'circle-check':'alert-circle'}`}),msg
  );
}

// ── Modal ─────────────────────────────────────────────────────
function Modal({title,onClose,children,footer}){
  return React.createElement('div',{className:'overlay',onClick:e=>{if(e.target===e.currentTarget)onClose()}},
    React.createElement('div',{className:'modal'},

      ),
      React.createElement('div',{className:'modal-body'},children),
      footer&&React.createElement('div',{className:'modal-footer'},footer)
    )
  );
}

// ── Login ─────────────────────────────────────────────────────
function Login({onLogin}){

// ── Stock bar ─────────────────────────────────────────────────
function StockBar({stock,threshold,max}){
  const pct=Math.min(100,Math.round((stock/(max||100))*100));
  const low=stock<=threshold;
  const color=low?'#E24B4A':stock<threshold*2?'#EF9F27':'#639922';
  return React.createElement('div',{className:'stock-bar-wrap'},
    React.createElement('div',{className:'stock-bar-bg'},
      React.createElement('div',{className:'stock-bar-fill',style:{width:pct+'%',background:color}})
    ),
    React.createElement('span',{className:'stock-qty'},stock)
  );
}

// ── Dashboard ─────────────────────────────────────────────────
function Dashboard({products,sales,purchases}){
  const totalProducts=products.length;
  const totalValue=products.reduce((s,p)=>s+p.stock*p.costPrice,0);
  const lowStock=products.filter(p=>p.stock<=p.threshold);
  const totalSales=sales.reduce((s,x)=>s+x.total,0);
  const recentSales=sales.slice(-5).reverse();
  const barData=[
    {label:'Electronics',val:products.filter(p=>p.category==='Electronics').reduce((s,p)=>s+p.stock,0)},
    {label:'Furniture',val:products.filter(p=>p.category==='Furniture').reduce((s,p)=>s+p.stock,0)},
    {label:'Stationery',val:products.filter(p=>p.category==='Stationery').reduce((s,p)=>s+p.stock,0)},
    {label:'Accessories',val:products.filter(p=>p.category==='Accessories').reduce((s,p)=>s+p.stock,0)},
  ];
  const maxBar=Math.max(...barData.map(x=>x.val),1);
  const catColors=['#185FA5','#3B6D11','#854F0B','#533AB7'];
  return React.createElement('div',null,

// ── Reports ───────────────────────────────────────────────────
function Reports({products,sales,purchases}){
  const totalInvValue=products.reduce((s,p)=>s+p.stock*p.costPrice,0);
  const totalRetailValue=products.reduce((s,p)=>s+p.stock*p.price,0);
  const totalSalesRev=sales.reduce((s,x)=>s+x.total,0);
  const totalPurchaseCost=purchases.filter(x=>x.status==='received').reduce((s,x)=>s+x.total,0);
  const grossProfit=sales.reduce((s,sale)=>{const p=products.find(x=>x.name===sale.product);return s+(p?(sale.unitPrice-p.costPrice)*sale.qty:0)},0);
  const lowStock=products.filter(p=>p.stock<=p.threshold);
  const topProducts=[...sales].reduce((acc,s)=>{acc[s.product]=(acc[s.product]||0)+s.total;return acc},{});
  const topList=Object.entries(topProducts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const catStock=products.reduce((acc,p)=>{acc[p.category]=(acc[p.category]||{qty:0,val:0});acc[p.category].qty+=p.stock;acc[p.category].val+=p.stock*p.costPrice;return acc},{});
  return React.createElement('div',null,
    React.createElement('div',{className:'alert alert-warning',style:{marginBottom:20}},
      React.createElement('i',{className:'ti ti-info-circle'}),
      'Report data is computed from current records. In production, this connects to Django REST API endpoints.'
    ),
    React.createElement('div',{className:'report-grid'},
      React.createElement('div',{className:'report-card'},
        React.createElement('h4',null,'Inventory summary'),
        React.createElement('div',{className:'report-row'},React.createElement('span',{className:'report-key'},'Total products'),React.createElement('span',{className:'report-val'},products.length)),
        React.createElement('div',{className:'report-row'},React.createElement('span',{className:'report-key'},'Stock value (cost)'),React.createElement('span',{className:'report-val'},fmt(totalInvValue))),
        React.createElement('div',{className:'report-row'},React.createElement('span',{className:'report-key'},'Stock value (retail)'),React.createElement('span',{className:'report-val'},fmt(totalRetailValue))),
        React.createElement('div',{className:'report-row'},React.createElement('span',{className:'report-key'},'Potential margin'),React.createElement('span',{className:'report-val',style:{color:'#3B6D11'}},fmt(totalRetailValue-totalInvValue))),
        React.createElement('div',{className:'report-row'},React.createElement('span',{className:'report-key'},'Low stock items'),React.createElement('span',{className:'report-val',style:{color:lowStock.length>0?'#A32D2D':'inherit'}},lowStock.length))
      ),
      React.createElement('div',{className:'report-card'},
        React.createElement('h4',null,'Sales & profit'),
        React.createElement('div',{className:'report-row'},React.createElement('span',{className:'report-key'},'Total revenue'),React.createElement('span',{className:'report-val'},fmt(totalSalesRev))),
        React.createElement('div',{className:'report-row'},React.createElement('span',{className:'report-key'},'Total purchases'),React.createElement('span',{className:'report-val'},fmt(totalPurchaseCost))),
        React.createElement('div',{className:'report-row'},React.createElement('span',{className:'report-key'},'Gross profit'),React.createElement('span',{className:'report-val',style:{color:grossProfit>=0?'#3B6D11':'#A32D2D'}},fmt(grossProfit))),
        React.createElement('div',{className:'report-row'},React.createElement('span',{className:'report-key'},'Profit margin'),React.createElement('span',{className:'report-val',style:{color:'#3B6D11'}},totalSalesRev>0?Math.round((grossProfit/totalSalesRev)*100)+'%':'—')),
        React.createElement('div',{className:'report-row'},React.createElement('span',{className:'report-key'},'Transactions'),React.createElement('span',{className:'report-val'},sales.length))
      ),
      React.createElement('div',{className:'report-card'},
        React.createElement('h4',null,'Top products by revenue'),
        topList.length===0?React.createElement('p',{style:{fontSize:13,color:'var(--text-muted)'}},'-'):
        topList.map(([name,val])=>React.createElement('div',{key:name,className:'report-row'},
          React.createElement('span',{className:'report-key',style:{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},name),
          React.createElement('span',{className:'report-val'},fmt(val))
        ))
      ),
      React.createElement('div',{className:'report-card'},
        React.createElement('h4',null,'Stock by category'),
        Object.entries(catStock).map(([cat,d])=>React.createElement('div',{key:cat,className:'report-row'},
          React.createElement('span',{className:'report-key'},cat),
          React.createElement('span',{className:'report-val'},d.qty+' units · '+fmt(d.val))
        ))
      )
    )
  );
}

// ── App ───────────────────────────────────────────────────────

  const [sales,setSales]=useStore('inv_sales',INIT_SALES);
  const [toast,setToast]=useState(null);
  const showToast=useCallback((msg,type='success')=>{setToast({msg,type,id:Date.now()})},[]);
  useEffect(() => {
  fetch('/api/products/')

    {id:'reports',icon:'chart-bar',label:'Reports'},

  const titles={dashboard:'Dashboard',products:'Products',suppliers:'Suppliers',purchases:'Purchases',sales:'Sales',reports:'Reports'};

  return React.createElement('div',{className:'app'},

      React.createElement('div',{className:'user-area'},
        React.createElement('div',{className:'user-card'},
          React.createElement('div',{className:'avatar'},user.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)),
          React.createElement('div',{className:'user-info'},
            React.createElement('div',{className:'name'},user.name),
            React.createElement('div',{className:'role'},user.role)

        ),
        React.createElement('button',{className:'btn btn-sm',style:{width:'100%',justifyContent:'center',marginTop:4},onClick:()=>setUser(null)},
          React.createElement('i',{className:'ti ti-logout'}),'Sign out'

    ),
    React.createElement('div',{className:'main'},
      React.createElement('div',{className:'topbar'},
        React.createElement('div',{className:'page-title'},titles[page]),
        React.createElement('div',{className:'topbar-actions'},
          React.createElement('div',{className:'badge badge-green'},React.createElement('i',{className:'ti ti-circle-filled',style:{fontSize:8,marginRight:4}}),'System online'),
          React.createElement('span',{style:{fontSize:12,color:'var(--text-muted)'}},new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}))
        )
      ),
      React.createElement('div',{className:'content'},
        page==='dashboard'&&React.createElement(Dashboard,{products,sales,purchases}),
        page==='products'&&React.createElement(Products,{products,setProducts,showToast}),
        page==='suppliers'&&React.createElement(Suppliers,{suppliers,setSuppliers,showToast}),
        page==='purchases'&&React.createElement(Purchases,{purchases,setPurchases,products,setProducts,suppliers,showToast}),
        page==='sales'&&React.createElement(Sales,{sales,setSales,products,setProducts,showToast}),

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
